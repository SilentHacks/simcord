site_name: SimCord
site_description: "SimCord is a discord.py testing framework. Simulate Discord and test your bot offline — no network, no token, no test server, no Terms of Service concerns. Prefix commands, slash commands, components, modals, permissions and events, all in-process and deterministic."
site_url: https://simcord.readthedocs.io/
site_author: SilentHacks
repo_url: https://github.com/SilentHacks/simcord
repo_name: SilentHacks/simcord
copyright: Copyright &copy; SilentHacks — MIT licensed

theme:
  name: material
  custom_dir: overrides
  favicon: assets/simcord-transparent.webp
  logo: assets/simcord-transparent.webp
  icon:
    repo: fontawesome/brands/github
  features:
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Home: index.md
  - Getting started:
      - Installation: installation.md
      - Quickstart: quickstart.md
      - Core concepts: concepts.md
  - Guides:
      - Test discord.py with pytest: guides/testing-discord-py-bots.md
      - Test without a token: guides/test-without-token.md
      - Test slash commands: guides/testing-slash-commands.md
      - Mocks vs. simulation: guides/mocks-vs-simulation.md
      - AI coding agents: guides/ai-coding-agents.md
      - Messages & prefix commands: guides/messages.md
      - Slash commands: guides/interactions.md
      - Components & modals: guides/components.md
      - Permissions: guides/permissions.md
      - Intents: guides/intents.md
      - Threads, reactions & DMs: guides/threads-reactions-dms.md
      - Audit logs, polls, events & voice: guides/moderation-and-guild.md
      - Time control: guides/time-control.md
      - Fixtures & configuration: guides/fixtures.md
      - Errors & diagnostics: guides/diagnostics.md
  - Recipes: cookbook.md
  - Reference:
      - API reference: api.md
      - Parity matrix: parity-matrix.md
      - Stability & versioning: stability.md
      - Performance: performance.md
      - Architecture: architecture.md
      - FAQ: faq.md
      - Changelog: changelog.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_root_heading: true
            show_source: true
            show_signature_annotations: true
            separate_signature: true
            members_order: source
            filters: ["!^_"]

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets:
      base_path: [.]
      check_paths: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/SilentHacks/simcord
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/simcord/
