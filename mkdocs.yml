site_name: SimCord
site_description: "SimCord — discord.py testing framework: simulate Discord, test your bot offline with no network or token"
site_url: https://silenthacks.github.io/simcord/
repo_url: https://github.com/SilentHacks/simcord
repo_name: SilentHacks/simcord

theme:
  name: material
  features:
    - content.code.copy
    - navigation.sections
  palette:
    - scheme: slate
      primary: indigo

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Guides:
      - Messages & prefix commands: guides/messages.md
      - Slash commands & interactions: guides/interactions.md
      - Permissions: guides/permissions.md
  - Architecture: architecture.md
  - Parity matrix: parity-matrix.md
  - Migrating from dpytest: migrating-from-dpytest.md

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.highlight
