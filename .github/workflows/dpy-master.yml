# Early warning for discord.py internal changes: run the suite against the
# upstream development branch every week (and on demand).
name: discord.py master

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          pip install -e .[pytest]
          pip install -U "discord.py @ git+https://github.com/Rapptz/discord.py"
      - run: pytest tests examples -q
