name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --extra dev
      - run: uv run ruff check src tests examples benchmarks
      - run: uv run ruff format --check src tests examples benchmarks
      - run: uv run pyright src

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --extra dev
      - run: uv run coverage run -m pytest tests examples -q
      - run: uv run coverage report

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --extra docs
      - run: uv run mkdocs build --strict

  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      # The perf guards (absolute budget + same-run scaling ratio) fail the build
      # on a catastrophic regression; the JSON is uploaded as a non-gating trend.
      - run: uv sync --extra bench
      - run: uv run pytest benchmarks --benchmark-json=benchmark.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results
          path: benchmark.json
