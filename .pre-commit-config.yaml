# Mirrors the CI `lint` job so failures surface before you push, using the
# project's own locked ruff/pyright (via `uv run`) rather than separately
# pinned copies — so passing pre-commit means passing CI.
#
#   uv run pre-commit install --install-hooks   # one-time setup
#
default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check src tests examples
        language: system
        types_or: [python]
        pass_filenames: false
        require_serial: true

      - id: ruff-format
        name: ruff format --check
        entry: uv run ruff format --check src tests examples
        language: system
        types_or: [python]
        pass_filenames: false
        require_serial: true

      - id: pyright
        name: pyright
        entry: uv run pyright src
        language: system
        types_or: [python]
        pass_filenames: false
        require_serial: true
        # Slower; run on push rather than every commit.
        stages: [pre-push]
